# roles/base/tasks/dotfiles.yml
---
- name: Dotfiles | Cloning repository
  git:
    repo: "{{ base_dotfiles_repo }}"
    dest: "{{ base_dotfiles_path }}"
    recursive: yes
  tags: dotfiles

- name: Dotfiles | Ensure specified directories exist
  file:
    path: "{{ base_dirs }}"
    state: directory

- name: Dotfiles | Symlinking .local/bin/
  file:
    src: "{{ base_dotfiles_dest }}/src/.local/bin/"
    dest: "{{ ansible_env.HOME }}/.local/bin"
    state: link
    recursive: yes
    force: yes

- name: Bash | Make scripts located ad ".bashrc.d/" executable
  file:
    path: "{{ item }}"
    mode: +x
  with_fileglob:
    - "{{ ansible_env.HOME }}/.bashrc.d/*"

- name: Dotfiles | Make scripts located ad ".local/bin/" executable
  file:
    path: "{{ item }}"
    mode: +x
  with_fileglob:
    - "{{ ansible_env.HOME }}/.local/bin/*"
